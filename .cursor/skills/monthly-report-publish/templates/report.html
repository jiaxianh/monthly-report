<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>月报 Monthly Report</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            aurora: {
              DEFAULT: '#0066FF',
              light: 'rgba(0, 102, 255, 0.15)',
              mid: 'rgba(0, 102, 255, 0.35)',
              strong: 'rgba(0, 102, 255, 0.6)',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background: #ffffff; }
    .gradient-aurora { background: linear-gradient(180deg, rgba(0,102,255,0.08) 0%, rgba(0,102,255,0.02) 100%); }
  </style>
</head>
<body class="min-h-screen bg-white text-gray-900 antialiased">
  <div class="max-w-6xl mx-auto px-6 py-12 md:py-20">
    <!-- Hero：超大标题/数字，中英混排 -->
    <header class="mb-20 md:mb-28" id="hero">
      <p class="text-xs text-gray-500 uppercase tracking-widest mb-4">Monthly Report</p>
      <h1 class="text-5xl md:text-7xl lg:text-8xl font-bold text-gray-900 tracking-tight leading-tight">月报标题</h1>
      <p class="mt-4 text-sm text-gray-500">副标题或英文点缀</p>
      <!-- 核心数字/要点：用超大字体 -->
      <div class="mt-12 flex flex-wrap gap-8">
        <div class="gradient-aurora rounded-2xl px-8 py-6 border border-aurora/30">
          <span class="block text-6xl md:text-7xl font-bold text-aurora">00</span>
          <span class="text-sm text-gray-500 uppercase mt-1">核心指标</span>
        </div>
      </div>
    </header>

    <!-- Bento Grid：大小块错落，按 MD 内容拆分为多个 section -->
    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-20">
      <!-- 大块：占 8 列 -->
      <section class="md:col-span-8 rounded-2xl border-2 border-gray-200 p-8 gradient-aurora" id="section-1">
        <h2 class="text-2xl md:text-3xl font-bold text-gray-900 mb-4">章节标题</h2>
        <p class="text-sm text-gray-500 uppercase mb-4">Section</p>
        <div class="prose prose-gray max-w-none">
          <p class="text-lg">此处由 MD 解析或手写填入月报正文，不得省略要点。</p>
          <ul class="list-none space-y-2 mt-4">
            <li class="flex items-start gap-2"><i class="fas fa-minus text-aurora mt-1.5 text-xs"></i><span>要点一</span></li>
            <li class="flex items-start gap-2"><i class="fas fa-minus text-aurora mt-1.5 text-xs"></i><span>要点二</span></li>
          </ul>
        </div>
      </section>
      <!-- 小块：占 4 列，勾线图或摘要 -->
      <section class="md:col-span-4 rounded-2xl border-2 border-gray-200 p-6 flex flex-col justify-center" id="section-2">
        <p class="text-xs text-gray-500 uppercase mb-3">Overview</p>
        <div class="w-full h-32 flex items-center justify-center text-aurora/40 border border-dashed border-aurora/30 rounded-xl">
          <svg width="80" height="60" viewBox="0 0 80 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 50 L20 35 L35 40 L50 20 L70 30" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="mt-4 text-sm text-gray-600">简洁勾线图或数据摘要</p>
      </section>
    </div>

    <!-- 第二行 Bento -->
    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 mb-20">
      <section class="md:col-span-4 rounded-2xl border border-gray-200 p-6" id="section-3">
        <h3 class="text-xl font-bold text-gray-900">小标题</h3>
        <p class="mt-2 text-gray-600 text-sm">内容…</p>
      </section>
      <section class="md:col-span-4 rounded-2xl border border-gray-200 p-6" id="section-4">
        <h3 class="text-xl font-bold text-gray-900">小标题</h3>
        <p class="mt-2 text-gray-600 text-sm">内容…</p>
      </section>
      <section class="md:col-span-4 rounded-2xl border border-gray-200 p-6" id="section-5">
        <h3 class="text-xl font-bold text-gray-900">小标题</h3>
        <p class="mt-2 text-gray-600 text-sm">内容…</p>
      </section>
    </div>

    <!-- 图表区（按需）：ECharts/Chart.js 样式与主题一致 -->
    <!-- <section class="rounded-2xl border-2 border-gray-200 p-8 mb-20" id="chart-section">
      <h2 class="text-2xl font-bold text-gray-900 mb-4">数据图表</h2>
      <div id="chart-container" class="h-80 w-full"></div>
    </section> -->

    <!-- 结论/总结：可再次使用超大数字 -->
    <section class="rounded-2xl gradient-aurora border border-aurora/30 p-10 mb-16" id="conclusion">
      <p class="text-xs text-gray-500 uppercase mb-2">Conclusion</p>
      <h2 class="text-3xl md:text-4xl font-bold text-gray-900">总结标题</h2>
      <p class="mt-4 text-gray-700">总结正文，保留月报所有要点。</p>
    </section>
  </div>

  <style>
    .reveal-section { opacity: 0; transform: translateY(32px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .reveal-section.visible { opacity: 1; transform: translateY(0); }
  </style>
  <script>
    (function() {
      var ids = ['hero', 'section-1', 'section-2', 'section-3', 'section-4', 'section-5', 'conclusion'];
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { rootMargin: '-60px 0px', threshold: 0 });
      ids.forEach(function(id, i) {
        var el = document.getElementById(id);
        if (!el) return;
        el.classList.add('reveal-section');
        el.style.transitionDelay = (Math.min(i * 0.06, 0.3)) + 's';
        observer.observe(el);
      });
    })();
  </script>
</body>
</html>
